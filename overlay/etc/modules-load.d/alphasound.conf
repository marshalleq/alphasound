# Pi Broadcom audio driver — provides HDMI audio output (and the analog
# 3.5mm jack on Pi models that have one). Pi Zero 2 W has no jack, so
# this is the only built-in audio path until you plug in a USB or HAT DAC.
# Without this loaded, /proc/asound/cards is empty and shairport-sync
# fails on every connection attempt.
snd_bcm2835
