# Alphasound DHCP config — isolated WiFi AP, no internet uplink
#
# dnsmasq's DEFAULT behaviour when dhcp-option 3 (router) and 6 (DNS)
# aren't configured is to send its own listen address (10.0.10.1) as
# both. That's why iOS sees 10.0.10.1 as "Router" in WiFi settings and
# tries to route internet traffic through the Pi (which has no uplink)
# before falling back to cellular. To suppress, we have to explicitly
# send these options with empty values — the trailing comma is the
# dnsmasq syntax for "option present, value empty".

interface=wlan0
bind-interfaces

# DHCP IP range for clients connecting to the Alphasound AP
dhcp-range=10.0.10.5,10.0.10.150,255.255.255.0,24h

# No router — forces clients to use another interface (cellular) for
# internet routing. Keeps them joined to the AP for local-only peers
# (AirPlay, the web UI at 10.0.10.1).
dhcp-option=3,

# No DNS server — clients should resolve names over cellular DNS.
dhcp-option=6,

# Disable dnsmasq's DNS listener entirely (pure DHCP here). Any stray
# DNS query on this interface gets connection-refused instead of
# waiting for a 5s timeout, which makes iOS fall back to cellular
# faster.
port=0
