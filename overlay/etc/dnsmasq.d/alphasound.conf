# Alphasound DHCP config
#
# Minimal DHCP for the isolated WiFi AP. dnsmasq's default behaviour
# sends its own IP (10.0.10.1) as DHCP option 3 (router) and option 6
# (DNS server), so iOS shows that address as "Router" in WiFi
# settings. iOS's captive-portal check then fails (no internet via
# the Pi) and iOS falls back to cellular for internet routing while
# keeping the AP joined for local peers (AirPlay, the web UI). That's
# the working state this project has always run with.
#
# An earlier revision tried to suppress the router advertisement with
# `dhcp-option=3,` + `dhcp-option=6,` (empty values) and `port=0`
# (disable DNS listener). That broke iOS connections — iPhones would
# associate to the AP and then drop with "unable to connect". We
# don't know the root cause (empty options may have been rejected by
# iOS's DHCP parser, or port=0 triggered a dnsmasq startup edge case),
# but the net effect was an unusable product. Reverted here.

interface=wlan0
bind-interfaces
dhcp-range=10.0.10.5,10.0.10.150,255.255.255.0,24h
