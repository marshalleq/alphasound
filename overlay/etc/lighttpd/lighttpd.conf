# Alphasound web UI — minimal lighttpd config. Shell CGIs under
# /var/www/cgi-bin/ handle the mutating endpoints; static index.html
# is the single-page UI.

server.document-root = "/var/www"
server.port          = 80
# server.username / server.groupname intentionally omitted: lighttpd
# refuses to set uid to 0 if you ask it explicitly, so we rely on
# inheriting root from the OpenRC-started process instead. CGIs need
# root to remount /media/mmcblk0p1, touch system files, and reboot;
# blast radius equals ssh-as-root which we already have on-device.

# Module order matters: mod_indexfile must come before mod_cgi so that
# directory-level lookups are resolved before CGI dispatch.
server.modules = (
    "mod_indexfile",
    "mod_cgi",
    "mod_staticfile",
    "mod_dirlisting",
)

index-file.names = ( "index.html" )

mimetype.assign = (
    ".html"  => "text/html; charset=utf-8",
    ".css"   => "text/css",
    ".js"    => "application/javascript",
    ".json"  => "application/json",
    ".svg"   => "image/svg+xml",
    ".png"   => "image/png",
    ".jpg"   => "image/jpeg",
    ".ico"   => "image/x-icon",
    ".woff2" => "font/woff2",
)

# Buffer uploads on tmpfs (plenty of RAM on a Pi Zero 2 W at ~500 MB).
# 256 MB ceiling is well above the ~60 MB apkovl we actually care about
# and leaves headroom for the bare-tar case (~170 MB after client-side
# gzip extraction).
server.upload-dirs      = ( "/tmp" )
server.max-request-size = 262144
server.errorlog         = "/var/log/lighttpd.log"

# Stream the request body into the CGI as it arrives from the client
# instead of fully buffering to upload-dirs first. Without this, a 60 MB
# apkovl upload pins 60 MB of tmpfs on a device whose root tmpfs is only
# ~200 MB — fills the fs at ~20 MB and stalls the connection. Our CGIs
# consume stdin linearly with `head -c`, so streaming is safe.
server.stream-request-body = 1

# CGI for everything under /cgi-bin/. Empty extension + empty
# interpreter means "execute the file directly via its shebang line",
# which matches our /bin/sh scripts. execute-x-only means only files
# with the executable bit set will run — plain data files never do.
$HTTP["url"] =~ "^/cgi-bin/" {
    cgi.assign          = ( "" => "" )
    cgi.execute-x-only  = "enable"
}

# Keep responses clean of absurd legacy headers
server.tag = "alphasound"
