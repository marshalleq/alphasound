# Alphasound web UI — minimal lighttpd config. Shell CGIs under
# /var/www/cgi-bin/ handle the mutating endpoints; static index.html
# is the single-page UI.

server.document-root = "/var/www"
server.port          = 80
# Root because CGIs remount /media/mmcblk0p1, touch system files,
# and reboot. Device is only reachable from its WPA2 AP or via
# authenticated sessions on a home network, so the blast radius is
# the same as having ssh as root (which we already do).
server.username      = "root"
server.groupname     = "root"

server.modules = (
    "mod_cgi",
    "mod_indexfile",
    "mod_staticfile",
    "mod_dirlisting",
)

index-file.names = ( "index.html" )

mimetype.assign = (
    ".html"  => "text/html; charset=utf-8",
    ".css"   => "text/css",
    ".js"    => "application/javascript",
    ".json"  => "application/json",
    ".svg"   => "image/svg+xml",
    ".png"   => "image/png",
    ".jpg"   => "image/jpeg",
    ".ico"   => "image/x-icon",
    ".woff2" => "font/woff2",
)

# Buffer uploads on tmpfs (plenty of RAM on a Pi Zero 2 W at ~500 MB).
# 256 MB ceiling is well above the ~60 MB apkovl we actually care about
# and leaves headroom for the bare-tar case (~170 MB after client-side
# gzip extraction).
server.upload-dirs      = ( "/tmp" )
server.max-request-size = 262144
server.errorlog         = "/var/log/lighttpd.log"

# CGI for everything under /cgi-bin/. Empty extension + empty
# interpreter means "execute the file directly via its shebang line",
# which matches our /bin/sh scripts. execute-x-only means only files
# with the executable bit set will run — plain data files never do.
$HTTP["url"] =~ "^/cgi-bin/" {
    cgi.assign          = ( "" => "" )
    cgi.execute-x-only  = "enable"
}

# Keep responses clean of absurd legacy headers
server.tag = "alphasound"
