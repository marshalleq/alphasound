name: Build Alphasound Image

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y dosfstools parted xz-utils curl

      - name: Build image
        run: ./build.sh

      - name: Get date for release tag
        id: date
        run: echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.date.outputs.date }}-${{ github.run_number }}
          name: Alphasound ${{ steps.date.outputs.date }}
          body: |
            Automated build from `main` branch.

            **Base OS**: Alpine Linux 3.21 (aarch64, diskless)
            **Shairport-sync**: from Alpine community repo
            **Bluetooth A2DP**: auto-pairing for non-Apple devices
            **Filesystem**: Runs entirely from RAM — SD card is read-only by design

            ## Quick start
            1. Flash the `.img.xz` to an SD card (Raspberry Pi Imager can flash `.xz` directly)
            2. Edit `alphasound.txt` on the SD card to set your preferences
            3. Insert SD card, power on, connect to the WiFi network, AirPlay
          files: deploy/alphasound.img.xz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
