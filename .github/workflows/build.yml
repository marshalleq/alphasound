name: Build Alphasound Image

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y dosfstools parted xz-utils curl

      - name: Build home variant
        env:
          VARIANT: home
        run: ./build.sh

      - name: Build car variant
        env:
          VARIANT: car
        run: ./build.sh

      # `gh release create` ships pre-installed on GitHub runners, so we
      # avoid the softprops/action-gh-release dependency (which was the
      # last lingering Node 20 action in this workflow).
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_NUM: ${{ github.run_number }}
        run: |
          DATE_STR=$(date +'%Y%m%d')
          TAG="build-${DATE_STR}-${RUN_NUM}"
          gh release create "$TAG" \
            --title "Alphasound ${DATE_STR}" \
            --notes "Automated build from \`main\` branch.

          **Base OS**: Alpine Linux 3.21 (aarch64, diskless)
          **Shairport-sync**: from Alpine community repo
          **Bluetooth A2DP**: auto-pairing for non-Apple devices
          **Filesystem**: Runs entirely from RAM — SD card is read-only by design

          Two variants published:
          - \`alphasound-home.img.xz\` — full feature set (display support, CEC, Roon, web UI brightness control). Use on a home/desk install.
          - \`alphasound-car.img.xz\` — stripped for boot speed; no Python/display/CEC/Roon. Use for behind-dash or trunk-mount installs where cold-start latency matters.

          ## Quick start
          1. Flash the appropriate \`.img.xz\` to an SD card (Raspberry Pi Imager can flash \`.xz\` directly)
          2. Edit \`alphasound.txt\` on the SD card to set your preferences
          3. Insert SD card, power on, connect to the WiFi network, AirPlay" \
            deploy/alphasound-home.img.xz \
            deploy/alphasound-home.apkovl.tar.gz \
            deploy/alphasound-car.img.xz \
            deploy/alphasound-car.apkovl.tar.gz
